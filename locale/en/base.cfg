[metaselector-product-to-ingredients]
caption=Product to Ingredients
help-richtext=[font=default-bold]This mode is scripted.[/font]\n\nFor the given machine, the first input item signal representing something the machine can craft will cause an output signal equal to the ingredients of a single craft of that item.\n\nThe value of input signal is ignored, and the output signals are always the ingredients for a single craft of the input item.\n\nIf the machine is not set, or if the input item is not craftable by that machine, no output signals will be produced.

